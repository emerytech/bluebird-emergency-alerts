# deploy/nginx/bluebird.conf — nginx reverse proxy for BlueBird Alerts
#
# Handles:
#   • HTTP → HTTPS redirect
#   • HTTPS termination (Let's Encrypt / certbot certs)
#   • WebSocket upgrade (alarm + district WS endpoints)
#   • Security headers
#   • Rate limiting on high-traffic endpoints
#
# Variables to substitute before deploying (or use envsubst):
#   ${DOMAIN}   — e.g. app.bluebirdalerts.com
#   ${CERT_DIR} — e.g. /etc/letsencrypt/live/app.bluebirdalerts.com
#
# certbot command:
#   certbot certonly --nginx -d ${DOMAIN}

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_alarm:10m  rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth:10m        rate=20r/m;

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream bluebird_backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Allow Let's Encrypt ACME challenges through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    # TLS certificates (certbot / Let's Encrypt)
    ssl_certificate     ${CERT_DIR}/fullchain.pem;
    ssl_certificate_key ${CERT_DIR}/privkey.pem;
    ssl_trusted_certificate ${CERT_DIR}/chain.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload (covers logo uploads, report PDFs)
    client_max_body_size 10m;

    # ── WebSocket endpoints ───────────────────────────────────────────────────
    # /ws/ and /{tenant}/ws/ prefixes for alarm + district streams
    location ~ ^(/[^/]+)?/ws(/|$) {
        proxy_pass http://bluebird_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Auth endpoints (stricter rate limit) ─────────────────────────────────
    location ~ ^(/[^/]+)?/(auth/login|super-admin/login|onboard/) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://bluebird_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Alarm trigger endpoints (strict rate limit) ───────────────────────────
    location ~ ^(/[^/]+)?/alarm/(activate|deactivate) {
        limit_req zone=api_alarm burst=5 nodelay;
        proxy_pass http://bluebird_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All other API traffic ─────────────────────────────────────────────────
    location / {
        limit_req zone=api_general burst=30 nodelay;
        proxy_pass http://bluebird_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # ── Health check (no rate limit, no auth) ────────────────────────────────
    location = /health {
        limit_req off;
        proxy_pass http://bluebird_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # Serve ACME challenges from certbot webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
