[pytest]
filterwarnings =
    ignore:You are using a Python version 3\.9 past its end of life.*:FutureWarning
    ignore:urllib3 v2 only supports OpenSSL 1\.1\.1\+.*:Warning

# "smoke" tests require a live server — excluded from the default run.
# Run with: pytest tests/test_smoke.py -m smoke
markers =
    smoke: live-server smoke tests (requires SMOKE_BASE_URL env var)

addopts = -m "not smoke"
